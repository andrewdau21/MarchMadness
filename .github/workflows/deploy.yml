name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - "webapp/**"

jobs:
  build-and-push:
    name: Build Docker image and push to DigitalOcean Container Registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install doctl (DigitalOcean CLI)
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA for image tag
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./webapp
          file: ./webapp/Dockerfile
          push: true
          tags: |
            registry.digitalocean.com/daucontainerregistry/marchcapness:latest
            registry.digitalocean.com/daucontainerregistry/marchcapness:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image pushed successfully
        run: |
          echo "Image pushed:"
          echo "  registry.digitalocean.com/daucontainerregistry/marchcapness:latest"
          echo "  registry.digitalocean.com/daucontainerregistry/marchcapness:${{ steps.meta.outputs.sha_short }}"
